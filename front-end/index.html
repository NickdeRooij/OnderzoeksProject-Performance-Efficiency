<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Filtering Dashboard</title>
</head>

<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">

            <span class="navbar-brand mb-0 h1">
                Filtering Performance Dashboard
            </span>

            <div>
                <a class="btn btn-outline-light btn-sm me-2" href="home.html">Home</a>
                <a class="btn btn-outline-light btn-sm me-2" href="index.html">Dashboard</a>
                <a class="btn btn-outline-light btn-sm" href="about.html">About</a>
            </div>

        </div>
    </nav>
    <div class="container">
        <div class="btn-group mb-3">
            <button id="clientBtn" class="btn btn-primary">Client-side</button>
            <button id="serverBtn" class="btn btn-outline-primary">Server-side</button>
        </div>

        <div class="row mb-3">

            <div class="col-md-2">
                <label class="form-label">Dataset</label>
                <select class="form-select" id="datasetSize">
                    <option value="small">1.000</option>
                    <option value="medium">10.000</option>
                    <option value="large">100.000</option>
                    <option value="xlarge">1.000.000</option>
                    <option value="xxlarge">5.000.000</option>
                </select>
            </div>

            <div class="col-md-2">
                <label class="form-label">Artist</label>
                <input class="form-control" id="artist">
            </div>

            <div class="col-md-2">
                <label class="form-label">Genre</label>
                <input class="form-control" id="genre">
            </div>

            <div class="col-md-2">
                <label class="form-label">Min Beats Per Minute</label>
                <input class="form-control" type="number" id="minBPM">
            </div>

            <div class="col-md-2">
                <label class="form-label">Max Beats Per Minute</label>
                <input class="form-control" type="number" id="maxBPM">
            </div>

            <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-success w-100" onclick="filter()">Filter</button>
            </div>

            <button class="btn btn-danger w-100 mt-2" onclick="runFullBenchmark()">
                Full Benchmark (Client + Server)
            </button>

            <p>Filtering time: <span id="time">0</span> ms</p>
        </div>
        <!-- <p>Showing first 100 results</p> -->
        <button class="btn btn-secondary mb-3" data-bs-toggle="collapse" data-bs-target="#datasetTable">
            Show / Hide Top 100 Results
        </button>
        <div id="datasetTable" class="collapse show">

            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Artist</th>
                        <th>Track</th>
                        <th>Genre</th>
                        <th>BPM</th>
                    </tr>
                </thead>

                <tbody id="resultsTable">
                </tbody>

            </table>

        </div>
        <div class="card shadow-sm mb-4">
            <div class="card-body">

                <h5 class="card-title">Performance Chart</h5>

                <canvas id="performanceChart" height="100"></canvas>

            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h5 class="card-title">Payload Chart</h5>
                <canvas id="payloadChart" height="100"></canvas>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">Memory Usage</h5>
                <canvas id="memoryChart"></canvas>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">

                <h5 class="card-title">Benchmark Results</h5>

                <div class="alert alert-info mb-2" id="benchmarkFilters"></div>

                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>Dataset</th>
                            <th>Results</th>
                            <th>Client Time (ms)</th>
                            <th>Server Time (ms)</th>
                            <th>Client Payload (KB)</th>
                            <th>Server Payload (KB)</th>
                            <th>Client Memory (MB)</th>
                            <th>Server Memory (MB)</th>
                        </tr>
                    </thead>

                    <tbody id="benchmarkTable"></tbody>

                </table>

            </div>
        </div>
    </div>
    </div>

    <script>
        let clientDataset = [];
        let mode = "client";
        let chart;
        let payloadChart;
        let benchmarkMode = false;
        let benchmarkResults = {};

        let memoryChart = new Chart(document.getElementById('memoryChart'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    {
                        label: "Client memory (MB)",
                        data: [],
                        borderColor: "green",
                        tension: 0.1
                    },
                    {
                        label: "Server memory (MB)",
                        data: [],
                        borderColor: "red",
                        tension: 0.1
                    }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        title: {
                            display: true,
                            text: "Memory usage (MB)"
                        }
                    },
                    x: {
                        title: {
                            display: true,
                            text: "Dataset size"
                        }
                    }
                }
            }
        });

        document.getElementById("clientBtn").onclick = () => {
            mode = "client";
            document.getElementById("clientBtn").classList.add("btn-primary");
            document.getElementById("clientBtn").classList.remove("btn-outline-primary");

            document.getElementById("serverBtn").classList.add("btn-outline-primary");
            document.getElementById("serverBtn").classList.remove("btn-primary");

            loadData();
        };

        document.getElementById("serverBtn").onclick = () => {
            mode = "server";
            document.getElementById("serverBtn").classList.add("btn-primary");
            document.getElementById("serverBtn").classList.remove("btn-outline-primary");

            document.getElementById("clientBtn").classList.add("btn-outline-primary");
            document.getElementById("clientBtn").classList.remove("btn-primary");

            loadData();
        };

        async function loadData() {

            const size = document.getElementById('datasetSize').value;

            console.log("---- DATASET LOAD START ----");
            console.log("Mode:", mode);
            console.log("Dataset size:", size);

            if (mode === "server") {
                console.log("Server mode actief → dataset wordt niet vooraf geladen");
                renderTable([]);
                return;
            }

            const start = performance.now();

            const res = await fetch(`http://localhost:5206/dataset/client/${size}`);
            const text = await res.text();

            clientPayloadKB = new Blob([text]).size / 1024;

            clientDataset = JSON.parse(text);

            console.log("Client payload:", clientPayloadKB.toFixed(2), "KB");

            const end = performance.now();

            console.log("Dataset geladen");
            console.log("Aantal records:", clientDataset.length);
            console.log("Laadtijd:", (end - start).toFixed(2), "ms");

            renderTable(clientDataset.slice(0, 100));

            console.log("---- DATASET LOAD END ----");
        }

        async function filter() {

            const size = document.getElementById('datasetSize').value;
            const artist = document.getElementById('artist').value;
            const genre = document.getElementById('genre').value;
            const minBPM = document.getElementById('minBPM').value;
            const maxBPM = document.getElementById('maxBPM').value;

            console.log("---- FILTER START ----");
            console.log("Mode:", mode);
            console.log("Dataset:", size);

            let result = [];
            let sizeKB = 0;

            // MEMORY BEFORE
            let memoryBefore = 0;
            if (performance.memory) {
                memoryBefore = performance.memory.usedJSHeapSize;
            }

            // TIMER START
            const start = performance.now();

            if (mode === "server") {

                let url = `http://localhost:5206/dataset/server/${size}?`;

                if (artist) url += `artist=${artist}&`;
                if (genre) url += `genre=${genre}&`;
                if (minBPM) url += `minBPM=${minBPM}&`;
                if (maxBPM) url += `maxBPM=${maxBPM}&`;

                console.log("Server request:", url);

                const res = await fetch(url);
                const text = await res.text();

                sizeKB = new Blob([text]).size / 1024;

                result = JSON.parse(text);

            } else {

                sizeKB = clientPayloadKB;

                result = clientDataset.filter(track =>
                    (!artist || track.artist.toLowerCase().includes(artist.toLowerCase())) &&
                    (!genre || track.genre.toLowerCase().includes(genre.toLowerCase())) &&
                    (!minBPM || track.bpm >= parseInt(minBPM)) &&
                    (!maxBPM || track.bpm <= parseInt(maxBPM))
                );

            }

            // TIMER END
            const end = performance.now();
            const time = end - start;

            // MEMORY AFTER
            let memoryAfter = 0;
            let memoryUsed = 0;

            if (performance.memory) {
                memoryAfter = performance.memory.usedJSHeapSize;
                memoryUsed = (memoryAfter - memoryBefore) / 1024 / 1024;
            }

            console.log("Results:", result.length);
            console.log("Filtering time:", time.toFixed(2), "ms");
            console.log("Memory used:", memoryUsed.toFixed(2), "MB");

            console.log("---- FILTER END ----");

            document.getElementById("time").textContent = time.toFixed(2);

            const dataset = document.getElementById('datasetSize').value;

            if (!benchmarkMode) {
                addDataToChart(dataset, time, mode, sizeKB, memoryUsed);
                addMemoryData(dataset, memoryUsed, mode);
            }

            if (!benchmarkMode) {
                renderTable(result.slice(0, 100));
            }

            return {
                time,
                sizeKB,
                memoryUsed,
                results: result.length,
                data: result
            };
        }

        function addDataToChart(datasetSize, time, mode, payloadKB, memoryMB) {

            const map = {
                small: "1k",
                medium: "10k",
                large: "100k",
                xlarge: "1M",
                xxlarge: "5M"
            };

            const label = map[datasetSize];

            if (!chart.data.labels.includes(label)) {
                chart.data.labels.push(label);
                payloadChart.data.labels.push(label);
            }

            const index = chart.data.labels.indexOf(label);

            // PERFORMANCE
            if (mode === "client") {
                chart.data.datasets[0].data[index] = time;
            } else {
                chart.data.datasets[1].data[index] = time;
            }

            // PAYLOAD
            if (mode === "client") {
                payloadChart.data.datasets[0].data[index] = payloadKB;
            } else {
                payloadChart.data.datasets[1].data[index] = payloadKB;
            }

            // MEMORY
            if (mode === "client") {
                memoryChart.data.datasets[0].data[index] = memoryMB;
            } else {
                memoryChart.data.datasets[1].data[index] = memoryMB;
            }

            chart.update();
            payloadChart.update();
            memoryChart.update();
        }

        function addMemoryData(datasetSize, memory, mode) {

            const map = {
                small: "1k",
                medium: "10k",
                large: "100k",
                xlarge: "1M",
                xxlarge: "5M"
            };

            const label = map[datasetSize];

            if (!memoryChart.data.labels.includes(label)) {
                memoryChart.data.labels.push(label);
            }

            const index = memoryChart.data.labels.indexOf(label);

            if (mode === "client") {
                memoryChart.data.datasets[0].data[index] = memory;
            } else {
                memoryChart.data.datasets[1].data[index] = memory;
            }

            memoryChart.update();
        }

        function initChart() {

            // Performance chart
            const ctx1 = document.getElementById("performanceChart");

            chart = new Chart(ctx1, {
                type: "line",
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'Client-side time (ms)',
                            data: [],
                            borderColor: 'blue',
                            tension: 0.1
                        },
                        {
                            label: 'Server-side time (ms)',
                            data: [],
                            borderColor: 'red',
                            tension: 0.1
                        }
                    ]
                },
                options: {
                    scales: {
                        y: {
                            type: 'logarithmic',  // hier zet je logaritme
                            title: {
                                display: true,
                                text: "Time (milliseconds)"
                            },
                            min: 0.05 // niet nul, anders werkt log niet
                        },
                        x: {
                            title: {
                                display: true,
                                text: "Dataset size"
                            }
                        }
                    }
                }
            });

            // Payload chart
            const ctx2 = document.getElementById("payloadChart");

            payloadChart = new Chart(ctx2, {
                type: "line",
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'Client payload (KB)',
                            data: [],
                            borderColor: 'green',
                            tension: 0.05
                        },
                        {
                            label: 'Server payload (KB)',
                            data: [],
                            borderColor: 'orange',
                            tension: 0.1
                        }
                    ]
                },
                options: {
                    scales: {
                        y: {
                            type: 'logarithmic', // logaritmische schaal
                            title: {
                                display: true,
                                text: "Payload size (KB)"
                            },
                            min: 0.1 // niet nul
                        },
                        x: {
                            title: {
                                display: true,
                                text: "Dataset size"
                            }
                        }
                    }
                }
            });
        }

        function renderTable(data) {
            const tbody = document.getElementById("resultsTable");;

            let html = '';

            data.forEach(track => {
                html += `
        <tr>
            <td>${track.id}</td>
            <td>${track.artist}</td>
            <td>${track.title}</td>
            <td>${track.genre}</td>
            <td>${track.bpm}</td>
        </tr>`;
            });

            tbody.innerHTML = html;
        }

        // Event listeners
        document.getElementById('datasetSize').addEventListener('change', loadData);

        window.onload = () => {
            initChart();
            loadData();
        };

        function renderBenchmarkTable() {

            const tbody = document.getElementById("benchmarkTable");

            const map = {
                small: "1k",
                medium: "10k",
                large: "100k",
                xlarge: "1M",
                xxlarge: "5M"
            };

            let html = "";

            for (const size in benchmarkResults) {

                const data = benchmarkResults[size];

                html += `
        <tr>
            <td>${map[size]}</td>
            <td>${data.client?.results ?? data.server?.results}</td>
            <td>${data.client?.time.toFixed(2)}</td>
            <td>${data.server?.time.toFixed(2)}</td>
            <td>${data.client?.payload.toFixed(2)}</td>
            <td>${data.server?.payload.toFixed(2)}</td>
            <td>${data.client?.memory.toFixed(2)}</td>
            <td>${data.server?.memory.toFixed(2)}</td>
        </tr>
        `;
            }

            tbody.innerHTML = html;
        }

        async function runFullBenchmark() {

            benchmarkMode = true;

            const datasets = ["small", "medium", "large", "xlarge", "xxlarge"];
            const runs = 5;

            console.log("===== FULL BENCHMARK START =====");

            updateBenchmarkFilters();

            let lastResultData = null;

            // CLIENT TEST
            mode = "client";

            for (const size of datasets) {

                document.getElementById("datasetSize").value = size;

                await loadData();

                let times = [];
                let payloads = [];
                let memories = [];
                let resultCount = 0;

                // warmup
                for (let i = 0; i < 3; i++) {
                    await filter();
                }

                for (let i = 0; i < runs; i++) {

                    const start = performance.now();

                    const result = await filter();

                    resultCount = result.results;

                    times.push(result.time);
                    payloads.push(result.sizeKB);

                    if (performance.memory) {
                        memories.push(performance.memory.usedJSHeapSize / 1024 / 1024);
                    }

                    // Sla resultaten van xxlarge op
                    if (size === "xxlarge" && i === runs - 1) {
                        lastResultData = result;
                        data: result.data.slice(0, 100)
                    }

                    await new Promise(r => setTimeout(r, 100));
                }

                times.sort((a, b) => a - b);

                times.shift(); // remove lowest
                times.pop();   // remove highest

                const avgTime = times.reduce((a, b) => a + b) / times.length;
                const avgPayload = payloads.reduce((a, b) => a + b) / runs;
                const avgMemory = memories.reduce((a, b) => a + b) / memories.length;

                console.log("Client avg", size, avgTime.toFixed(2), "ms");

                addDataToChart(size, avgTime, "client", avgPayload, avgMemory);
                addMemoryData(size, avgMemory, "client");

                benchmarkResults[size] ??= {};
                benchmarkResults[size].client = {
                    time: avgTime,
                    payload: avgPayload,
                    memory: avgMemory,
                    results: resultCount
                };
            }

            // SERVER TEST
            mode = "server";

            for (const size of datasets) {

                document.getElementById("datasetSize").value = size;

                let times = [];
                let payloads = [];
                let memories = [];
                let resultCount = 0;

                // warmup
                for (let i = 0; i < 3; i++) {
                    await filter();
                }

                for (let i = 0; i < runs; i++) {

                    const start = performance.now();

                    const result = await filter();

                    resultCount = result.results;

                    const end = performance.now();

                    times.push(end - start);
                    payloads.push(result.sizeKB);

                    if (performance.memory) {
                        memories.push(performance.memory.usedJSHeapSize / 1024 / 1024);
                    }

                    // Sla resultaten van xxlarge op
                    if (size === "xxlarge" && i === runs - 1) {
                        lastResultData = result;
                        data: result.data.slice(0, 100)
                    }

                    await new Promise(r => setTimeout(r, 100));
                }

                times.sort((a, b) => a - b);

                times.shift(); // remove lowest
                times.pop();   // remove highest

                const avgTime = times.reduce((a, b) => a + b) / times.length;
                const avgPayload = payloads.reduce((a, b) => a + b) / runs;
                const avgMemory = memories.reduce((a, b) => a + b) / memories.length;

                addDataToChart(size, avgTime, "server", avgPayload, avgMemory);
                addMemoryData(size, avgMemory, "server");

                benchmarkResults[size] ??= {};
                benchmarkResults[size].server = {
                    time: avgTime,
                    payload: avgPayload,
                    memory: avgMemory,
                    results: resultCount
                };
            }

            benchmarkMode = false;

            renderBenchmarkTable();

            console.log("===== FULL BENCHMARK DONE =====");

            if (lastResultData) {
                renderTable(lastResultData.data.slice(0, 100));
            }
        }

        function updateBenchmarkFilters() {

            const artist = document.getElementById("artist").value || "-";
            const genre = document.getElementById("genre").value || "-";
            const minBPM = document.getElementById("minBPM").value || "-";
            const maxBPM = document.getElementById("maxBPM").value || "-";

            document.getElementById("benchmarkFilters").textContent =
                `Filters → Artist: ${artist} | Genre: ${genre} | BPM: ${minBPM} - ${maxBPM}`;
        }

    </script>
</body>

</html>
